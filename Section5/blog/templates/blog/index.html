{% extends "base.html" %}
<!-- prettier-ignore -->
{% block title %}My Blog{% endblock %}
<!-- prettier-ignore -->
{% block content %}

<div class="min-h-screen bg-gradient-to-br from-green-50 to-blue-50 py-12 px-4">
	<div class="max-w-3xl mx-auto">
		<h1 class="text-4xl font-extrabold text-gray-900 mb-6">Welcome to the Blog</h1>
		<p class="text-lg text-gray-700 mb-8">Discover our latest posts and insights on various topics. Stay tuned for updates!</p>
		<a href="{% url 'posts' %}" class="inline-block bg-blue-600 text-white px-6 py-3 rounded-lg shadow-md hover:bg-blue-700 transition-colors"> View Posts </a>
	</div>
</div>
{% endblock %}
