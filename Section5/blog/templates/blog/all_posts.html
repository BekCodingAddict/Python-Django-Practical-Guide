{% extends "base.html" %}
<!-- ignore prettier -->
{% load static %}
<!-- ignore prettier -->
{% block title %}All Posts{% endblock %} {% block content %}
<section class="max-w-5xl mx-auto px-4 py-16">
	<h1 class="text-4xl font-bold text-gray-900 mb-10">All Posts</h1>
	<div class="space-y-8">
		{% for post in posts %}
		<article class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-lg transition flex flex-col md:flex-row">
			<div class="md:w-64 h-48 md:h-auto bg-gradient-to-br from-blue-100 to-indigo-100 flex items-center justify-center shrink-0">
				<img src="{% static 'blog/images/'|add:post.image %}" alt="{{ post.title }}" class="w-full h-full object-cover" />
			</div>
			<div class="p-6 flex-1">
				<p class="text-sm text-blue-600 font-medium mb-1">{{ post.date }} &middot; By {{ post.author }}</p>
				<h2 class="text-2xl font-bold text-gray-900 mb-2">{{ post.title }}</h2>
				<p class="text-gray-600 mb-4">{{ post.excerpt }}</p>
				<a href="{% url 'post_detail' post.slug %}" class="text-blue-600 font-medium hover:underline"> Read More &rarr; </a>
			</div>
		</article>
		{% endfor %}
	</div>
</section>
{% endblock %}
