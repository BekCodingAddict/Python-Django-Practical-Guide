<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<script src="https://cdn.tailwindcss.com"></script>
		<title>{% block title %}My Blog{% endblock %}</title>
		{% block css %}{% endblock %}
	</head>
	<body class="bg-gray-50 min-h-screen flex flex-col">
		<nav class="bg-white shadow">
			<div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
				<a href="{% url 'home' %}" class="text-2xl font-bold text-blue-600">MyBlog</a>
				<div class="space-x-6">
					<a href="{% url 'home' %}" class="text-gray-700 hover:text-blue-600 font-medium">Home</a>
					<a href="{% url 'posts' %}" class="text-gray-700 hover:text-blue-600 font-medium">All Posts</a>
				</div>
			</div>
		</nav>

		<main class="flex-1">{% block content %}{% endblock %}</main>

		<footer class="bg-white border-t mt-12">
			<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">&copy; 2026 MyBlog. Built with Django.</div>
		</footer>
	</body>
</html>
