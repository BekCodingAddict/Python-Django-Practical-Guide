{% extends "book_outlet/base.html" %}
<!-- ignore prettier -->
{% block title %} All Books {% endblock%}
<!-- ignore prettier -->
{% block content %}
<ul>
	{% for book in books %}
	<li>
		<a href="{{book.get_absolute_url}}">{{book.title}} by {{book.author}} - {{book.rating}}</a>
	</li>
	{% endfor %}

	<hr>
	<li>Total Books: {{total_books}}</li>
	<li>Average Rating: {{average_rating}}</li>
</ul>
{% endblock %}
